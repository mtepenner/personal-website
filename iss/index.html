<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matthew Penner | ISS Tracker</title>
    <link rel="icon" type="image/jpeg" href="/professionalphoto.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080810;
            --bg-secondary: #0d0d1a;
            --card-bg: #0f0f20;
            --card-border: #1a1a35;
            --text-color: #c8d6e5;
            --text-bright: #ffffff;
            --primary-color: #00d4ff;
            --secondary-color: #7b2fff;
            --green-neon: #00ff88;
            --glow-cyan: 0 0 10px #00d4ff, 0 0 20px rgba(0,212,255,0.4);
            --glow-purple: 0 0 10px #7b2fff, 0 0 20px rgba(123,47,255,0.4);
            --glow-green: 0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            font-size: 1.05rem;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── BACK NAV ────────────────────────────────── */
        .back-nav {
            background: rgba(8,8,16,0.95);
            border-bottom: 1px solid rgba(0,212,255,0.2);
            padding: 0.85rem 2rem;
        }

        .back-nav a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--primary-color);
            text-decoration: none;
            letter-spacing: 0.06em;
            transition: all 0.2s;
        }

        .back-nav a:hover {
            color: var(--green-neon);
            text-shadow: var(--glow-green);
        }

        /* ── MAIN WRAPPER ────────────────────────────── */
        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1.5rem;
        }

        /* ── CARD ────────────────────────────────────── */
        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-left: 3px solid var(--primary-color);
            border-radius: 2px 8px 8px 2px;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,212,255,0.02);
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--primary-color);
            text-shadow: var(--glow-cyan);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        button {
            width: 100%;
            padding: 0.75rem 1.2rem;
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 0 8px rgba(0,212,255,0.4);
        }

        button:hover {
            background: var(--green-neon);
            box-shadow: var(--glow-green);
            transform: translateY(-2px);
        }

        button:disabled {
            background: rgba(0,212,255,0.3);
            color: rgba(8,8,16,0.6);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .console {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: #050508;
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.88rem;
            color: var(--text-color);
            min-height: 120px;
            white-space: pre-wrap;
            overflow-x: auto;
            line-height: 1.7;
        }

        /* ── FOOTER ──────────────────────────────────── */
        footer {
            text-align: center;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(0,212,255,0.2);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82rem;
            color: #555;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="https://matthewpenner.com/">&larr; Back to Main Profile</a>
    </div>

    <div class="page-wrapper">
        <div class="container">
            <h1>ISS Locator</h1>
            <button id="trackBtn">Find the ISS</button>
            <div id="output" class="console">Ready to fetch coordinates...</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Matthew Penner. All Rights Reserved.</p>
    </footer>

<script>
    document.getElementById('trackBtn').addEventListener('click', async () => {
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('trackBtn');
        
        // Reset UI
        outputDiv.textContent = "Fetching real-time ISS coordinates...\n";
        btn.disabled = true;

        try {
            // 1. Fetch ISS Coordinates using a CORS-friendly HTTPS API
            const issUrl = "https://api.wheretheiss.at/v1/satellites/25544";
            const issResponse = await fetch(issUrl);
            
            if (!issResponse.ok) {
                throw new Error(`Failed to get data from ISS API. Status: ${issResponse.status}`);
            }

            const issJson = await issResponse.json();
            
            // The JSON structure is slightly different for this new API
            const latitude = issJson.latitude.toFixed(4);
            const longitude = issJson.longitude.toFixed(4);

            outputDiv.textContent += `ISS is currently at -> Latitude: ${latitude}, Longitude: ${longitude}\n`;
            outputDiv.textContent += `Determining location on Earth...\n`;

            // 2. Reverse Geocode the Coordinates using OpenStreetMap Nominatim
            const geoUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10`;
            
            const geoResponse = await fetch(geoUrl, {
                headers: {
                    'Accept-Language': 'en-US,en;q=0.9'
                }
            });

            if (!geoResponse.ok) {
                throw new Error(`Failed to get data from Geocoding API. Status: ${geoResponse.status}`);
            }

            const geoJson = await geoResponse.json();

            // 3. Output the result
            if (geoJson.error) {
                outputDiv.textContent += `\nResult: The ISS is currently over an ocean or an unmapped region.\n`;
            } else if (geoJson.display_name) {
                outputDiv.textContent += `\nResult: The ISS is currently passing over:\n${geoJson.display_name}\n`;
            } else {
                outputDiv.textContent += `\nResult: Location data is unavailable for these coordinates.\n`;
            }

        } catch (error) {
            outputDiv.textContent += `\nException: ${error.message}\n`;
        } finally {
            // Re-enable the button
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
