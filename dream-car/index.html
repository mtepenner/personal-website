<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Car Designer | Matthew Penner</title>
    <link rel="icon" type="image/jpeg" href="/professionalphoto.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080810;
            --bg-secondary: #0d0d1a;
            --card-bg: #0f0f20;
            --card-border: #1a1a35;
            --text-color: #c8d6e5;
            --text-bright: #ffffff;
            --primary-color: #00d4ff;
            --secondary-color: #7b2fff;
            --accent-color: #ff2d78;
            --green-neon: #00ff88;
            --glow-cyan: 0 0 10px #00d4ff, 0 0 20px rgba(0,212,255,0.4);
            --glow-purple: 0 0 10px #7b2fff, 0 0 20px rgba(123,47,255,0.4);
            --glow-green: 0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        nav {
            background: rgba(8,8,16,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,212,255,0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.85rem 2rem;
            text-align: center;
        }

        nav a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--primary-color);
            text-decoration: none;
            letter-spacing: 0.06em;
            margin: 0 1rem;
            transition: all 0.2s;
        }

        nav a:hover {
            color: var(--green-neon);
            text-shadow: var(--glow-green);
        }

        .page-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-top: 3px solid var(--primary-color);
            padding: 2rem;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,255,0.05);
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 900;
            color: var(--primary-color);
            text-shadow: var(--glow-cyan);
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        .container > p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--secondary-color);
            letter-spacing: 0.06em;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--primary-color);
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(0,212,255,0.3);
        }

        select option { background: #0f0f20; color: var(--text-color); }

        button {
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            letter-spacing: 0.08em;
            transition: all 0.25s ease;
            box-shadow: 0 0 12px rgba(0,212,255,0.4);
        }

        button:hover { background: var(--secondary-color); box-shadow: var(--glow-purple); }
        button:disabled { background: #2a2a40; color: #555; cursor: not-allowed; box-shadow: none; }

        #result-section {
            margin-top: 2rem;
            display: none;
            border-top: 1px solid rgba(0,212,255,0.2);
            padding-top: 2rem;
        }

        #result-section h2 {
            font-family: 'Orbitron', monospace;
            color: var(--primary-color);
            text-shadow: var(--glow-cyan);
            font-size: 1.1rem;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
        }

        #result-section h3 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--green-neon);
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        #generated-image {
            width: 100%;
            border-radius: 4px;
            border: 1px solid rgba(0,212,255,0.3);
            background-color: #0a0a18;
            min-height: 300px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
        }

        .prompt-display {
            background: #0a0a18;
            border: 1px solid rgba(0,212,255,0.2);
            border-left: 3px solid var(--primary-color);
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #abb2bf;
            margin-top: 0.5rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .loading {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            color: var(--primary-color);
            text-shadow: var(--glow-cyan);
            display: none;
            margin: 1rem 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(0,212,255,0.2);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 0.08em;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">&larr; Back to Main Profile</a>
    </nav>

    <div class="page-wrapper">
    <div class="container">
        <h1>Dream Car Generator</h1>
        <p>Select your specs, and the program will render your custom vehicle.</p>

        <form id="car-form">
            <div class="form-group">
                <label for="era">Era / Time Period</label>
                <select id="era">
                    <option value="Modern">Modern (Current Year)</option>
                    <option value="Vintage 1960s">Vintage (1960s)</option>
                    <option value="Vintage 1980s">Retro (1980s)</option>
                    <option value="Retro-Futuristic">Retro-Futuristic Cyberpunk</option>
                    <option value="Futuristic Concept">Far Future Concept</option>
                </select>
            </div>

            <div class="form-group">
                <label for="passengers">Passenger Count (1-9)</label>
                <input type="number" id="passengers" min="1" max="9" value="4">
            </div>

            <div class="form-group">
                <label for="color">Exterior Color</label>
                <input type="text" id="color" placeholder="e.g., Matte Black, Cherry Red, Metallic Blue" value="Metallic Emerald Green">
            </div>

            <div class="form-group">
                <label for="styling">Exterior Styling</label>
                <select id="styling">
                    <option value="Sleek and aerodynamic">Sleek & Aerodynamic</option>
                    <option value="Aggressive and muscular">Aggressive & Muscular</option>
                    <option value="Boxy and utilitarian">Boxy & Utilitarian</option>
                    <option value="Minimalist and elegant">Minimalist & Elegant</option>
                    <option value="Rugged off-road">Rugged Off-Road</option>
                </select>
            </div>

            <div class="form-group">
                <label for="drivetrain">Drivetrain</label>
                <select id="drivetrain">
                    <option value="AWD (All-Wheel Drive)">AWD (All-Wheel Drive)</option>
                    <option value="RWD (Rear-Wheel Drive)">RWD (Rear-Wheel Drive)</option>
                    <option value="FWD (Front-Wheel Drive)">FWD (Front-Wheel Drive)</option>
                    <option value="4x4 High-Clearance">4x4 High-Clearance</option>
                </select>
            </div>

            <button type="submit" id="generate-btn">Show Car</button>
        </form>

        <div class="loading" id="loading-indicator">Rendering your car... Please wait up to 10 seconds.</div>

        <div id="result-section">
            <h2>Your Rendering</h2>
            <img id="generated-image" alt="AI Generated Car will appear here">
            
            <h3>Prompt Used:</h3>
            <div class="prompt-display" id="prompt-display"></div>
        </div>
    </div>

    <script>
        document.getElementById('car-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload
            
            // UI State updates
            const btn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading-indicator');
            const resultSection = document.getElementById('result-section');
            const imageEl = document.getElementById('generated-image');
            const promptDisplay = document.getElementById('prompt-display');

            btn.disabled = true;
            loading.style.display = 'block';
            resultSection.style.display = 'none';

            // Gather inputs
            const era = document.getElementById('era').value;
            const passengers = document.getElementById('passengers').value;
            const color = document.getElementById('color').value;
            const styling = document.getElementById('styling').value;
            const drivetrain = document.getElementById('drivetrain').value;

            // Construct the Prompt
            const prompt = `A highly detailed, photorealistic 8k commercial automotive photograph of a ${era} car. The exterior is ${color} with ${styling} styling. The cabin is proportioned to comfortably seat ${passengers} passengers. The car has a ${drivetrain} stance and chassis setup. Shot in a professional studio with dramatic cinematic lighting, masterpiece, sharp focus, ray tracing.`;

            // Display the prompt text
            promptDisplay.textContent = prompt;

            // Use Pollinations.ai (Free, no key required, works directly via URL)
            // Adding a random seed helps ensure a new image is generated if they click multiple times with the same prompt
            const randomSeed = Math.floor(Math.random() * 100000);
            const width = 800;
            const height = 450;
            const encodedPrompt = encodeURIComponent(prompt);
            
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&seed=${randomSeed}&nologo=true`;

            // Load the image
            imageEl.onload = function() {
                loading.style.display = 'none';
                resultSection.style.display = 'block';
                btn.disabled = false;
            };

            imageEl.onerror = function() {
                loading.style.display = 'none';
                alert("There was an error generating the image. The free API might be temporarily busy. Please try again.");
                btn.disabled = false;
            };

            // Setting the src triggers the API call
            imageEl.src = imageUrl;
        });
    </script>
    </div>

    <footer>
        <p>&copy; 2026 Matthew Penner. All Rights Reserved.</p>
    </footer>

</body>
</html>
