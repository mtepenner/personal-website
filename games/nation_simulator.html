<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nation Simulator: Epoch One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for the event log */
        #event-log::-webkit-scrollbar {
            width: 8px;
        }
        #event-log::-webkit-scrollbar-track {
            background: #1f2937; /* gray-800 */
        }
        #event-log::-webkit-scrollbar-thumb {
            background: #4b5563; /* gray-600 */
            border-radius: 4px;
        }
        #event-log::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* gray-500 */
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Setup Screen -->
    <div id="setup-screen" class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-xl shadow-2xl p-8 transition-all duration-500">
        <h1 class="text-3xl font-bold text-center text-blue-400 mb-6">Nation Simulator</h1>
        <p class="text-center text-gray-400 mb-8 text-sm">Epoch One</p>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Country Name</label>
                <input type="text" id="input-name" placeholder="e.g., Freedonia" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Capital City</label>
                <input type="text" id="input-capital" placeholder="e.g., Metropolis" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Government Type</label>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 p-3 border border-gray-700 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors">
                        <input type="radio" name="gov_type" value="Democracy" checked class="text-blue-500 focus:ring-blue-500 bg-gray-800 border-gray-600">
                        <span class="text-sm"><b>Democracy</b> <span class="text-gray-400 block text-xs">Bonus: +25 Starting Approval</span></span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-700 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors">
                        <input type="radio" name="gov_type" value="Monarchy" class="text-blue-500 focus:ring-blue-500 bg-gray-800 border-gray-600">
                        <span class="text-sm"><b>Monarchy</b> <span class="text-gray-400 block text-xs">Bonus: +800 Starting Treasury</span></span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-700 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors">
                        <input type="radio" name="gov_type" value="Dictatorship" class="text-blue-500 focus:ring-blue-500 bg-gray-800 border-gray-600">
                        <span class="text-sm"><b>Dictatorship</b> <span class="text-gray-400 block text-xs">Bonus: +40 Starting Military</span></span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-700 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors">
                        <input type="radio" name="gov_type" value="Technocracy" class="text-blue-500 focus:ring-blue-500 bg-gray-800 border-gray-600">
                        <span class="text-sm"><b>Technocracy</b> <span class="text-gray-400 block text-xs">Bonus: +100 Income, +100 Resources</span></span>
                    </label>
                </div>
            </div>

            <button onclick="startGame()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors mt-4">
                Found Nation
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden w-full max-w-6xl flex flex-col lg:flex-row gap-6">
        
        <!-- Left Column: Stats -->
        <div class="lg:w-1/3 flex flex-col gap-6">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-lg">
                <h2 id="nation-title" class="text-2xl font-bold text-blue-400 mb-1">Nation Name</h2>
                <p id="nation-subtitle" class="text-sm text-gray-400 mb-6">Capital • Government</p>
                
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-800">
                    <span class="text-gray-400 font-medium tracking-wider uppercase text-sm">Turn <span id="stat-turn" class="text-white text-lg ml-1">1</span></span>
                    <span class="text-gray-400 font-medium tracking-wider uppercase text-sm">Tax: <span id="stat-tax-level" class="text-white text-lg ml-1">Normal</span></span>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-3"><span class="text-xl">💰</span> <span class="font-medium text-gray-300">Treasury</span></div>
                        <span id="stat-treasury" class="font-bold text-yellow-400 text-lg">1000</span>
                    </div>
                    <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-3"><span class="text-xl">📦</span> <span class="font-medium text-gray-300">Resources</span></div>
                        <span id="stat-resources" class="font-bold text-orange-400 text-lg">100</span>
                    </div>
                    <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-3"><span class="text-xl">⚔️</span> <span class="font-medium text-gray-300">Military</span></div>
                        <span id="stat-military" class="font-bold text-red-400 text-lg">20</span>
                    </div>
                    <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-3"><span id="approval-icon" class="text-xl">😊</span> <span class="font-medium text-gray-300">Approval</span></div>
                        <span id="stat-approval" class="font-bold text-green-400 text-lg">50%</span>
                    </div>
                    <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg">
                        <div class="flex items-center gap-3"><span class="text-xl">📈</span> <span class="font-medium text-gray-300">Base Income</span></div>
                        <span id="stat-income" class="font-bold text-blue-400 text-lg">200/t</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Middle Column: Actions -->
        <div class="lg:w-1/3 flex flex-col gap-4">
            <h3 class="text-xl font-bold text-gray-200 mb-2">Decrees & Actions</h3>
            
            <!-- Tax Actions -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                <p class="text-sm font-medium text-gray-400 mb-3 uppercase tracking-wide">Adjust Taxation</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setTax('Low')" class="action-btn bg-gray-800 hover:bg-gray-700 text-gray-200 text-xs py-2 px-2 rounded border border-gray-700 transition-colors">Low<br><span class="text-gray-400 text-[10px]">+Approv, -Inc</span></button>
                    <button onclick="setTax('Normal')" class="action-btn bg-gray-800 hover:bg-blue-900 text-blue-200 text-xs py-2 px-2 rounded border border-blue-800 transition-colors">Normal<br><span class="text-gray-400 text-[10px]">Standard</span></button>
                    <button onclick="setTax('High')" class="action-btn bg-gray-800 hover:bg-gray-700 text-gray-200 text-xs py-2 px-2 rounded border border-gray-700 transition-colors">High<br><span class="text-gray-400 text-[10px]">-Approv, +Inc</span></button>
                </div>
            </div>

            <!-- Trade Actions -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                <p class="text-sm font-medium text-gray-400 mb-3 uppercase tracking-wide">Trade</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="buyResources()" class="action-btn bg-gray-800 hover:bg-gray-700 text-gray-200 text-sm py-2 px-3 rounded border border-gray-700 transition-colors flex flex-col items-center">
                        <span>Buy Resources</span>
                        <span class="text-xs text-gray-400 mt-1">-100g &rarr; +20res</span>
                    </button>
                    <button onclick="sellResources()" class="action-btn bg-gray-800 hover:bg-gray-700 text-gray-200 text-sm py-2 px-3 rounded border border-gray-700 transition-colors flex flex-col items-center">
                        <span>Sell Resources</span>
                        <span class="text-xs text-gray-400 mt-1">-20res &rarr; +80g</span>
                    </button>
                </div>
            </div>

            <!-- Economy & Military -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-2">
                <button onclick="investEconomy()" class="action-btn w-full bg-blue-900 hover:bg-blue-800 text-blue-100 text-sm py-3 px-4 rounded border border-blue-700 transition-colors flex justify-between items-center">
                    <span class="font-semibold">Invest in Economy</span>
                    <span class="text-xs bg-blue-950 px-2 py-1 rounded">-300g &rarr; +50 Inc</span>
                </button>
                <button onclick="buildMilitary()" class="action-btn w-full bg-red-900 hover:bg-red-800 text-red-100 text-sm py-3 px-4 rounded border border-red-700 transition-colors flex justify-between items-center">
                    <span class="font-semibold">Expand Military</span>
                    <span class="text-xs bg-red-950 px-2 py-1 rounded">-200g, -30res &rarr; +25 Mil</span>
                </button>
            </div>

            <!-- End Turn -->
            <button onclick="endTurn()" id="btn-end-turn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-transform transform hover:scale-[1.02] mt-auto">
                End Turn
            </button>
        </div>

        <!-- Right Column: Event Log -->
        <div class="lg:w-1/3 flex flex-col h-[500px] lg:h-auto">
            <h3 class="text-xl font-bold text-gray-200 mb-2">Event Log</h3>
            <div id="event-log" class="flex-1 bg-gray-900 border border-gray-800 rounded-xl p-4 overflow-y-auto font-mono text-sm flex flex-col gap-2 shadow-inner">
                <!-- Log entries go here -->
            </div>
        </div>

    </div>

    <script>
        // Game State
        let state = {
            name: "Freedonia",
            capital: "Metropolis",
            gov_type: "Democracy",
            treasury: 1000,
            approval: 50,
            military: 20,
            resources: 100,
            base_income: 200,
            tax_level: "Normal",
            turn: 1,
            isGameOver: false
        };

        // --- Core Functions ---

        function startGame() {
            // Get inputs
            const nameInput = document.getElementById('input-name').value.trim();
            const capitalInput = document.getElementById('input-capital').value.trim();
            
            if (nameInput) state.name = nameInput;
            if (capitalInput) state.capital = capitalInput;
            
            // Get Radio choice
            const govRadios = document.getElementsByName('gov_type');
            for (let radio of govRadios) {
                if (radio.checked) {
                    state.gov_type = radio.value;
                    break;
                }
            }

            // Apply Bonuses
            let bonusMsg = "";
            if (state.gov_type === "Democracy") {
                state.approval += 25;
                bonusMsg = "Democracy established! Public Approval gets a major boost (+25).";
            } else if (state.gov_type === "Monarchy") {
                state.treasury += 800;
                bonusMsg = "Monarchy established! The royal coffers start full (+800 Treasury).";
            } else if (state.gov_type === "Dictatorship") {
                state.military += 40;
                bonusMsg = "Dictatorship established! Your military starts strong (+40 Military).";
            } else if (state.gov_type === "Technocracy") {
                state.base_income += 100;
                state.resources += 100;
                bonusMsg = "Technocracy established! Increased passive income and starting resources.";
            }

            // UI Transitions
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            updateHeader();
            updateUI();
            log(`The Nation of ${state.name} is founded!`, 'info');
            log(`[Bonus] ${bonusMsg}`, 'good');
            log(`Turn ${state.turn} begins.`, 'neutral');
        }

        function updateHeader() {
            document.getElementById('nation-title').textContent = state.name;
            document.getElementById('nation-subtitle').textContent = `${state.capital} • ${state.gov_type}`;
        }

        function updateUI() {
            document.getElementById('stat-turn').textContent = state.turn;
            document.getElementById('stat-tax-level').textContent = state.tax_level;
            
            // Animate numbers (simple flash effect by toggling classes could be added, keeping simple for now)
            document.getElementById('stat-treasury').textContent = Math.floor(state.treasury);
            document.getElementById('stat-resources').textContent = Math.floor(state.resources);
            document.getElementById('stat-military').textContent = Math.floor(state.military);
            
            const approvalEl = document.getElementById('stat-approval');
            approvalEl.textContent = `${Math.floor(state.approval)}%`;
            
            // Approval Colors/Icons
            const iconEl = document.getElementById('approval-icon');
            if (state.approval > 75) {
                approvalEl.className = "font-bold text-green-400 text-lg";
                iconEl.textContent = "😁";
            } else if (state.approval > 40) {
                approvalEl.className = "font-bold text-yellow-400 text-lg";
                iconEl.textContent = "😐";
            } else {
                approvalEl.className = "font-bold text-red-500 text-lg";
                iconEl.textContent = "😠";
            }

            document.getElementById('stat-income').textContent = `${Math.floor(state.base_income)}/t`;

            // Update Tax Buttons styling active state
            const taxBtns = document.querySelectorAll('button[onclick^="setTax"]');
            taxBtns.forEach(btn => {
                if (btn.getAttribute('onclick').includes(state.tax_level)) {
                    btn.classList.remove('border-gray-700', 'text-gray-200');
                    btn.classList.add('border-blue-500', 'text-blue-300', 'bg-gray-800');
                } else {
                    btn.classList.remove('border-blue-500', 'text-blue-300');
                    btn.classList.add('border-gray-700', 'text-gray-200');
                }
            });
        }

        function log(message, type = 'neutral') {
            const logContainer = document.getElementById('event-log');
            const entry = document.createElement('div');
            
            // Styling based on message type
            let styleClass = "text-gray-300"; // neutral
            if (type === 'good') styleClass = "text-green-400";
            else if (type === 'bad') styleClass = "text-red-400";
            else if (type === 'info') styleClass = "text-blue-400 font-bold";
            else if (type === 'warning') styleClass = "text-yellow-400 font-bold";

            entry.className = `p-2 rounded bg-gray-800/50 border-l-2 border-gray-600 ${styleClass}`;
            entry.innerHTML = `<span class="opacity-50 text-xs mr-2">[T${state.turn}]</span> ${message}`;
            
            logContainer.appendChild(entry);
            // Auto scroll to bottom
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // --- Player Actions ---

        function setTax(level) {
            if (state.isGameOver) return;
            state.tax_level = level;
            log(`Tax rate adjusted to ${level}.`, 'neutral');
            updateUI();
        }

        function buyResources() {
            if (state.isGameOver) return;
            if (state.treasury >= 100) {
                state.treasury -= 100;
                state.resources += 20;
                log(`Bought 20 Resources for 100 Gold.`, 'good');
                updateUI();
            } else {
                log(`Not enough Gold to buy resources!`, 'bad');
            }
        }

        function sellResources() {
            if (state.isGameOver) return;
            if (state.resources >= 20) {
                state.resources -= 20;
                state.treasury += 80;
                log(`Sold 20 Resources for 80 Gold.`, 'good');
                updateUI();
            } else {
                log(`Not enough Resources to sell!`, 'bad');
            }
        }

        function investEconomy() {
            if (state.isGameOver) return;
            if (state.treasury >= 300) {
                state.treasury -= 300;
                state.base_income += 50;
                log(`Invested 300 Gold. Base income increased to ${state.base_income}/t.`, 'good');
                updateUI();
            } else {
                log(`Not enough Gold to invest in the economy!`, 'bad');
            }
        }

        function buildMilitary() {
            if (state.isGameOver) return;
            if (state.treasury >= 200 && state.resources >= 30) {
                state.treasury -= 200;
                state.resources -= 30;
                state.military += 25;
                log(`Military expanded! Power is now ${state.military}.`, 'good');
                updateUI();
            } else {
                log(`Not enough Gold or Resources to expand military!`, 'bad');
            }
        }

        // --- Turn Resolution ---

        function endTurn() {
            if (state.isGameOver) return;
            
            log(`--- Ending Turn ${state.turn} ---`, 'info');

            // Calculate Income & Approval changes based on Tax Level
            let actualIncome = state.base_income;
            if (state.tax_level === "Low") {
                actualIncome = Math.floor(state.base_income * 0.6);
                state.approval = Math.min(100, state.approval + 5);
            } else if (state.tax_level === "High") {
                actualIncome = Math.floor(state.base_income * 1.5);
                state.approval -= 8;
            }

            state.treasury += actualIncome;
            log(`Collected ${actualIncome} gold in taxes.`, 'neutral');

            // Random Events (30% chance)
            if (Math.random() < 0.30) {
                triggerWarfareEvent();
            }

            // Check Game Over condition
            if (state.approval <= 0) {
                triggerGameOver();
                return;
            }

            state.turn += 1;
            updateUI();
            log(`Turn ${state.turn} begins.`, 'neutral');
        }

        function triggerWarfareEvent() {
            log(`🚨 HOSTILE FORCES DETECTED! 🚨`, 'warning');
            
            // Enemy power scales slightly with the turn number
            const enemyPower = Math.floor(Math.random() * 31) + 10 + (state.turn * 3);
            log(`An enemy nation attacks with Military Power: ${enemyPower}! (Your Power: ${state.military})`, 'warning');

            if (state.military >= enemyPower) {
                const spoils = Math.floor(Math.random() * 201) + 100;
                state.treasury += spoils;
                state.approval = Math.min(100, state.approval + 10);
                log(`✅ VICTORY! Repelled the attackers. Seized ${spoils} gold. Public Approval (+10).`, 'good');
            } else {
                const goldLost = Math.min(state.treasury, Math.floor(Math.random() * 301) + 200);
                const resLost = Math.min(state.resources, Math.floor(Math.random() * 51) + 30);
                
                state.treasury -= goldLost;
                state.resources -= resLost;
                state.approval -= 20;
                
                log(`❌ DEFEAT! Defenses breached! Lost ${goldLost} gold and ${resLost} resources. Public Approval (-20).`, 'bad');
            }
        }

        function triggerGameOver() {
            state.isGameOver = true;
            state.approval = 0;
            updateUI();
            
            log(`=========================`, 'bad');
            log(`GAME OVER`, 'bad');
            log(`Public approval dropped to 0%.`, 'bad');
            log(`The citizens have revolted and overthrown your government!`, 'bad');
            log(`You survived for ${state.turn} turns.`, 'info');
            log(`Refresh the page to play again.`, 'neutral');
            
            // Disable all action buttons visually
            const btns = document.querySelectorAll('.action-btn');
            btns.forEach(btn => {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:bg-gray-700', 'hover:bg-blue-800', 'hover:bg-red-800', 'hover:bg-blue-900');
            });
            
            const endBtn = document.getElementById('btn-end-turn');
            endBtn.classList.remove('bg-green-600', 'hover:bg-green-500', 'hover:scale-[1.02]');
            endBtn.classList.add('bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
            endBtn.textContent = "Game Over";
        }
    </script>
</body>
</html>
